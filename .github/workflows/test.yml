name: Test
on:
  push:
  pull_request:
  schedule: [{ cron: "0 0 10 * *" }] # monthly https://crontab.guru/#0_0_10_*_*
  workflow_dispatch:

permissions: {}
jobs:
  test:
    uses: nodenv/.github/.github/workflows/test.yml@v7.0.8
    with: { npm: false }
    permissions:
      contents: read
      packages: read
      id-token: write
      security-events: write
      statuses: write

  checksums:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need history for lint:checksums
          persist-credentials: false
      - run: npm ci

        # FIXME workaround https://github.com/actions/checkout/issues/910
      - if: github.event_name == 'pull_request'
        run: npm run lint:checksums -- "origin/${GITHUB_BASE_REF}"
      - run: npm run lint:checksums -- HEAD^
        if: github.event_name == 'push'
